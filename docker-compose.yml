services:
  web:
    build: .
    env_file:
      - .env.production
    environment:
      APP_HOST: 0.0.0.0
      DATABASE_URL: postgresql+psycopg://assistant:assistant_password@postgres:5432/assistant_agent
    ports:
      - "8765:8765"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "python -m assistant_agent.init_db && uvicorn assistant_agent.server:create_app_from_env --factory --host 0.0.0.0 --port $${APP_PORT:-8765}"

  worker:
    build: .
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg://assistant:assistant_password@postgres:5432/assistant_agent
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "python -m assistant_agent.init_db && python -m assistant_agent.worker"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: assistant_agent
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: assistant_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistant -d assistant_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
